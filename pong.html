<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
canvas {
    border:2px solid #d3d3d3;
    background-color: #f1f1f1;
}
</style>
<link href="https://fonts.googleapis.com/css?family=Roboto+Mono&display=swap" rel="stylesheet">
</head>
<body onload="startPong()">
<script src="pong.js"></script>
<br>
<h2>PONG GAME</h2><br>
<span id=game></span>
<br>
<input type=button value="Game with computer" onclick="startPongwithComputer()">
<input type=button value="Game with opponent" onclick="startPongwithOpponent()">
<br>
<br>
<h3>Controls:</h3>
<ul>
<li><strong>Q</strong> - Player 1 move up</li>
<li><strong>A</strong> - Player 1 move down</li>
<li><strong>P</strong> - Player 2 move up</li>
<li><strong>L</strong> - Player 2 move down</li>
<li><strong>Z</strong> - Serve for Player 1</li>
<li><strong>,</strong> (comma) - Serve for Player 2</li>
</ul>
<br>    
<div id=out style="display: none;">123</div> 
<span id=debug></span>
        
    
</html>
